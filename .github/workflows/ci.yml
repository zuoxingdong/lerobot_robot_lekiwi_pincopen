name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install (CPU torch, then the plugin with lerobot)
        run: |
          python -m pip install torch --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e .[dev]
      - name: Import + discovery check
        run: |
          python - <<'PY'
          from lerobot.utils.import_utils import register_third_party_plugins
          register_third_party_plugins()
          from lerobot.robots import RobotConfig
          assert "lekiwi_pincopen" in RobotConfig.get_known_choices()
          import lerobot_robot_lekiwi_pincopen.lekiwi_host  # host wrapper importable
          print("discovery OK")
          PY
      - name: Ruff
        run: python -m ruff check .
      - name: Tests
        run: python -m pytest tests
